openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BaseballSalaryCheck API — salary fairness predictions from a linear regression on MLB batting stats.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player season records and salary valuations
  - name: predictions
    description: Salary fairness predictions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List player seasons
      description: Searchable, sortable, paginated list of player-season records with model salary valuations.
      parameters:
        - name: q
          in: query
          required: false
          description: Case-insensitive search over player id and team.
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: Field to sort by.
          schema:
            type: string
            enum: [salary, year, playerID, percentDifference, predictedSalary]
            default: salary
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: verdict
          in: query
          required: false
          description: Filter by salary verdict.
          schema:
            type: string
            enum: [Overpaid, Underpaid, Paid Fairly]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: A page of player seasons.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerList"
  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a single player season
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player season record with valuation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /player-options:
    get:
      operationId: listPlayerOptions
      tags: [players]
      summary: List all player-season options
      description: Lightweight list of every player-season (id, player id, year, team, salary) for populating selectors. No stats or valuations.
      responses:
        "200":
          description: All player-season options.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerOption"
  /summary:
    get:
      operationId: getSummary
      tags: [players]
      summary: Dataset summary
      description: Aggregate statistics across the full dataset, including model verdict breakdown.
      responses:
        "200":
          description: Dataset summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Summary"
  /leaders:
    get:
      operationId: getLeaders
      tags: [players]
      summary: Salary leaderboards
      description: Most overpaid, most underpaid, and highest-paid player seasons.
      responses:
        "200":
          description: Leaderboards.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Leaders"
  /predict:
    post:
      operationId: predictSalary
      tags: [predictions]
      summary: Predict salary fairness
      description: Given batting stats and a current salary, returns the model's fair-value prediction and a verdict.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionInput"
      responses:
        "200":
          description: Prediction result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Verdict:
      type: string
      enum: [Overpaid, Underpaid, Paid Fairly]
    PlayerStats:
      type: object
      description: The 23 model features (booleans encoded as 0 or 1).
      required:
        - SeasonsPlayed
        - Games
        - AtBats
        - Runs
        - Hits
        - Doubles
        - Triples
        - HomeRuns
        - RunsBattedIn
        - StolenBases
        - CaughtStealing
        - Walks
        - Strikeouts
        - IntentionalWalks
        - HitsByPitch
        - SacrificeHits
        - SacrificeFlies
        - GroundedIntoDoublePlays
        - BattingAverage
        - OnBasePercentage
        - SluggingPercentage
        - isArbitrationEligible
        - isFreeAgent
      properties:
        SeasonsPlayed: { type: number }
        Games: { type: number }
        AtBats: { type: number }
        Runs: { type: number }
        Hits: { type: number }
        Doubles: { type: number }
        Triples: { type: number }
        HomeRuns: { type: number }
        RunsBattedIn: { type: number }
        StolenBases: { type: number }
        CaughtStealing: { type: number }
        Walks: { type: number }
        Strikeouts: { type: number }
        IntentionalWalks: { type: number }
        HitsByPitch: { type: number }
        SacrificeHits: { type: number }
        SacrificeFlies: { type: number }
        GroundedIntoDoublePlays: { type: number }
        BattingAverage: { type: number }
        OnBasePercentage: { type: number }
        SluggingPercentage: { type: number }
        isArbitrationEligible: { type: number }
        isFreeAgent: { type: number }
    Player:
      type: object
      required:
        - id
        - playerID
        - year
        - team
        - salary
        - predictedSalary
        - ratio
        - percentDifference
        - verdict
        - stats
      properties:
        id: { type: string }
        playerID: { type: string }
        year: { type: integer }
        team: { type: string }
        salary:
          type: integer
          description: Actual recorded salary in USD.
        predictedSalary:
          type: number
          description: Model fair-value salary in USD.
        ratio:
          type: number
          description: predictedSalary / salary.
        percentDifference:
          type: number
          description: How far actual salary is from fair value, in percent. Positive means overpaid.
        verdict:
          $ref: "#/components/schemas/Verdict"
        stats:
          $ref: "#/components/schemas/PlayerStats"
    PlayerOption:
      type: object
      required:
        - id
        - playerID
        - year
        - team
        - salary
      properties:
        id: { type: string }
        playerID: { type: string }
        year: { type: integer }
        team: { type: string }
        salary: { type: integer }
    PlayerList:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        total:
          type: integer
    Summary:
      type: object
      required:
        - totalSeasons
        - distinctPlayers
        - avgSalary
        - medianSalary
        - minSalary
        - maxSalary
        - minYear
        - maxYear
        - overpaidCount
        - underpaidCount
        - fairCount
      properties:
        totalSeasons: { type: integer }
        distinctPlayers: { type: integer }
        avgSalary: { type: number }
        medianSalary: { type: number }
        minSalary: { type: integer }
        maxSalary: { type: integer }
        minYear: { type: integer }
        maxYear: { type: integer }
        overpaidCount: { type: integer }
        underpaidCount: { type: integer }
        fairCount: { type: integer }
    Leaders:
      type: object
      required:
        - mostOverpaid
        - mostUnderpaid
        - highestPaid
      properties:
        mostOverpaid:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        mostUnderpaid:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        highestPaid:
          type: array
          items:
            $ref: "#/components/schemas/Player"
    PredictionInput:
      type: object
      required:
        - stats
        - currentSalary
      properties:
        stats:
          $ref: "#/components/schemas/PlayerStats"
        currentSalary:
          type: number
          exclusiveMinimum: 0
          description: The player's current salary in USD to evaluate against fair value.
        playerID:
          type: string
          description: Optional player id for display/context.
        year:
          type: integer
          description: Optional season year for display/context.
    PredictionResult:
      type: object
      required:
        - predictedSalary
        - currentSalary
        - ratio
        - percentDifference
        - magnitude
        - verdict
      properties:
        predictedSalary:
          type: number
          description: Model fair-value salary in USD.
        currentSalary:
          type: number
        ratio:
          type: number
          description: currentSalary / predictedSalary.
        percentDifference:
          type: number
          description: (currentSalary - predictedSalary) / predictedSalary * 100. Positive means overpaid.
        magnitude:
          type: number
          description: Absolute percent difference clamped to 0-100, for a level bar.
        verdict:
          $ref: "#/components/schemas/Verdict"
