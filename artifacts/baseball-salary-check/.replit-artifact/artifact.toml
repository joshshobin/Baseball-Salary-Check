kind = "web"
previewPath = "/"
title = "BaseballSalaryCheck"
version = "1.0.0"
id = "artifacts/baseball-salary-check"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19788

[services.development]
run = "pnpm --filter @workspace/baseball-salary-check run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/baseball-salary-check", "run", "build" ]
publicDir = "artifacts/baseball-salary-check/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19788"
BASE_PATH = "/"
